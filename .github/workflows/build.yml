name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: Swift build (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Headless scan self-test
        run: swift run ClaudeSessions --scan-test || true

  web:
    name: Node syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax check (zero dependencies — nothing to install)
        run: node --check web/server.js

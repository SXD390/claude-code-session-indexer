name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: Swift build + security self-test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Unit tests
        run: swift test
      - name: Adversarial security self-test
        # Exits non-zero if the resume/.command quoting or handoff-write bounds
        # ever regress. This is the harness the README/audit rely on — it MUST
        # be able to fail the build (no `|| true`).
        env:
          CSI_SECURITY_SELFTEST: "1"
        run: swift run ClaudeSessions --security-selftest "$RUNNER_TEMP/sectest"

  web:
    name: Node checks + CSRF/header smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax check (zero dependencies — nothing to install)
        run: node --check web/server.js && node --check web/mcp-server.js
      - name: Unit tests
        run: node web/test/unit.mjs
      - name: Web security smoke test
        # Asserts the localhost defenses (loopback-Host allowlist, Origin check,
        # X-CSI-Request gate, session-id UUID gate, hardening headers) actually
        # fire. Fails the build if any regress.
        run: node web/test/security-smoke.mjs
      - name: MCP server test
        # Drives the read-only MCP stdio server (initialize / tools/list /
        # tools/call) against a temp fixture and asserts JSON-RPC framing +
        # that stdout carries ONLY protocol messages (no stray logs).
        run: node web/test/mcp.mjs
      - name: Optional FTS index test (fallback on Node 20)
        # The optional SQLite FTS5 search backend is opt-in and requires the
        # experimental node:sqlite (Node 22.5+). On this Node 20 runner it must
        # assert the silent-fallback contract (isAvailable()===false, linear
        # scan still works) and pass as a no-op. On Node 22.5+ it also builds a
        # real index and asserts FTS parity with the scan. Never installs deps.
        run: node web/test/index.mjs
